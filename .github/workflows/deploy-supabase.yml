# Deploy Supabase: migrations, edge functions, secret, dan konfigurasi cron.
# Trigger: manual lewat tab Actions -> "Run workflow".
#
# WAJIB di-set sekali di GitHub: Settings -> Secrets and variables -> Actions -> New repository secret
#   SUPABASE_ACCESS_TOKEN  : Personal access token (Supabase Dashboard -> Account -> Access Tokens)
#   SUPABASE_PROJECT_REF   : Project ref (Dashboard -> Project Settings -> General -> Reference ID)
#   SUPABASE_DB_PASSWORD   : Password database (Dashboard -> Project Settings -> Database)
#   CRON_SECRET            : String random panjang buatan Anda (lihat catatan di chat untuk cara generate)

name: Deploy Supabase

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      # Web push (FCM). FCM_SERVICE_ACCOUNT = isi penuh JSON service account Firebase.
      # APP_URL = URL aplikasi produksi (deep-link klik notifikasi). Keduanya opsional:
      # bila FCM_SERVICE_ACCOUNT kosong, langkah web push dilewati tanpa menggagalkan deploy.
      FCM_SERVICE_ACCOUNT: ${{ secrets.FCM_SERVICE_ACCOUNT }}
      APP_URL: ${{ secrets.APP_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validasi secrets tersedia
        run: |
          missing=0
          for v in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF SUPABASE_DB_PASSWORD CRON_SECRET; do
            if [ -z "${!v}" ]; then
              echo "::error::Secret $v belum di-set di GitHub repo secrets."
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link ke project Supabase
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Rekonsiliasi migrasi yang sudah di-revert (migration repair)
        # Migrasi 202605310001 (shift_status_sync #30) & 20260531113613 (purge_tombstoned_*)
        # sempat ter-push ke prod lalu DI-REVERT dari repo. Remote schema_migrations masih
        # mencatat keduanya sehingga `supabase db push` berhenti: "Remote migration versions
        # not found in local migrations directory". Tandai REVERTED agar history konsisten
        # (hanya mengubah tabel pelacak; objek DDL sisa tak diutak-atik & sudah dinetralkan
        # oleh migrasi 20260531120000). Idempotent: bila sudah direkonsiliasi langkah ini
        # no-op. continue-on-error agar tak menggagalkan deploy bila tak ada yang perlu
        # diperbaiki — `db push` di bawah tetap gerbang error sebenarnya.
        continue-on-error: true
        run: supabase migration repair --status reverted 202605310001 20260531113613

      - name: Push database migrations
        run: supabase db push

      - name: Set edge function secret (CRON_SECRET)
        run: supabase secrets set CRON_SECRET="$CRON_SECRET"

      - name: Set edge function secret web push (FCM_SERVICE_ACCOUNT, APP_URL)
        if: ${{ env.FCM_SERVICE_ACCOUNT != '' }}
        run: |
          # Coba padatkan JSON ke satu baris; jika jq gagal parse, kirim as-is.
          # Kegagalan jq biasanya berarti secret bukan JSON valid — edge function
          # akan tetap di-deploy tapi mungkin gagal saat runtime; periksa isi secret.
          if compact=$(printf '%s' "$FCM_SERVICE_ACCOUNT" | jq -c . 2>/dev/null); then
            supabase secrets set FCM_SERVICE_ACCOUNT="$compact"
          else
            echo "::warning::FCM_SERVICE_ACCOUNT gagal di-parse oleh jq (bukan JSON valid?). Mengirim as-is — periksa isi secret di GitHub (harus berisi file JSON service account Firebase lengkap)."
            supabase secrets set FCM_SERVICE_ACCOUNT="$FCM_SERVICE_ACCOUNT"
          fi
          if [ -n "$APP_URL" ]; then
            supabase secrets set APP_URL="$APP_URL"
          fi

      - name: Deploy edge function send-push
        if: ${{ env.FCM_SERVICE_ACCOUNT != '' }}
        # --no-verify-jwt: dipanggil trigger DB via pg_net dengan header x-cron-secret, bukan JWT user.
        run: supabase functions deploy send-push --no-verify-jwt

      - name: Deploy edge function approve-pending-registration
        run: supabase functions deploy approve-pending-registration

      - name: Deploy edge function resolve-operational-access
        run: supabase functions deploy resolve-operational-access

      - name: Deploy edge function sync-operational-access
        run: supabase functions deploy sync-operational-access

      - name: Deploy edge function revoke-operational-access
        run: supabase functions deploy revoke-operational-access

      - name: Deploy edge function resign-expiring-assets
        # --no-verify-jwt: dipanggil pg_cron via header x-cron-secret, bukan JWT user.
        run: supabase functions deploy resign-expiring-assets --no-verify-jwt

      - name: Konfigurasi database settings untuk cron (via Management API)
        run: |
          functions_url="https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1"
          sql=$(cat <<SQL
          insert into private.app_config (key, value) values
            ('functions_url', '${functions_url}'),
            ('cron_secret', '${CRON_SECRET}')
          on conflict (key) do update set value = excluded.value, updated_at = now();
          SQL
          )
          payload=$(jq -n --arg q "$sql" '{query: $q}')
          http_code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -X POST "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload")
          echo "HTTP $http_code"
          cat /tmp/resp.json
          case "$http_code" in
            2*)
              echo "Konfigurasi database berhasil."
              ;;
            *)
              # Config disimpan di tabel private.app_config (lihat migration
              # 202605290003_fix_asset_resign_config.sql). Dipakai oleh:
              #   - cron resign-expiring-assets (refresh signed URL foto), DAN
              #   - trigger dispatch_push_for_notification() -> WEB PUSH NOTIFICATION.
              # Jika gagal, WEB PUSH TIDAK AKAN TERKIRIM (trigger no-op). Jangan
              # gagalkan deploy, tapi set manual di SQL Editor:
              #   insert into private.app_config (key, value) values
              #     ('functions_url', '<functions_url>'), ('cron_secret', '<CRON_SECRET>')
              #   on conflict (key) do update set value = excluded.value, updated_at = now();
              echo "::warning::Gagal tulis private.app_config (HTTP $http_code). PUSH NOTIFICATION & re-sign foto TIDAK akan jalan sampai ini di-set manual di SQL Editor. Sinkronisasi patroli / finalize_shift tidak terpengaruh."
              ;;
          esac

      - name: Selesai
        run: echo "Deploy Supabase selesai. Cron resign-expiring-assets aktif setiap 01:00 UTC (08:00 WIB)."
